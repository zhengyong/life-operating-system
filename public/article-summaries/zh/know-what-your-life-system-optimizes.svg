      <path d="M68 584 l3.2 3.6 l6.2 -7.1" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><text x="94" y="592" font-size="23" font-weight="600" fill="#19375f"><tspan x="94" dy="0">标注每件事背后的奖励信号：收入、面子、安全感、成长。</tspan></text><circle cx="72" cy="626" r="8" fill="#0d8e78"/>
