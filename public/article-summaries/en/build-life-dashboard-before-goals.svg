      <text x="58" y="192" font-size="23" font-weight="800" fill="#ffffff">1. Core Thesis</text>
      <circle cx="68" cy="224" r="8" fill="#0b66c3"/>
      <path d="M64 224 l3.2 3.6 l6.2 -7.1" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><text x="90" y="232" font-size="21" font-weight="600" fill="#19375f"><tspan x="90" dy="0">A goal list captures desire; a</tspan><tspan x="90" dy="31">dashboard manages operation.</tspan></text><circle cx="68" cy="298" r="8" fill="#0b66c3"/>
      <path d="M64 298 l3.2 3.6 l6.2 -7.1" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><text x="90" y="306" font-size="21" font-weight="600" fill="#19375f"><tspan x="90" dy="0">Without an operating surface, goals</tspan><tspan x="90" dy="31">stay as emotion and slogans.</tspan></text><circle cx="68" cy="372" r="8" fill="#0b66c3"/>
      <path d="M64 372 l3.2 3.6 l6.2 -7.1" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><text x="90" y="380" font-size="21" font-weight="600" fill="#19375f"><tspan x="90" dy="0">Reliable change usually comes from</tspan><tspan x="90" dy="31">process, not annual drama.</tspan></text>
    </g>
  
