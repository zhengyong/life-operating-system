      <path d="M820 584 l3.2 3.6 l6.2 -7.1" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><text x="846" y="592" font-size="20" font-weight="600" fill="#19375f"><tspan x="846" dy="0">Are resources being overdrawn for too long?</tspan></text><circle cx="824" cy="626" r="8" fill="#e07a1f"/>
      <path d="M820 626 l3.2 3.6 l6.2 -7.1" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><text x="846" y="634" font-size="20" font-weight="600" fill="#19375f"><tspan x="846" dy="0">Does review capture feedback, not only feelings?</tspan></text><circle cx="824" cy="668" r="8" fill="#e07a1f"/>
      <path d="M820 668 l3.2 3.6 l6.2 -7.1" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><text x="846" y="676" font-size="20" font-weight="600" fill="#19375f"><tspan x="846" dy="0">Is the next action specific enough for tomorrow?</tspan></text>
