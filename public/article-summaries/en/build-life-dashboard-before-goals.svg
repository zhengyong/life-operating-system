      <path d="M68 542 l3.2 3.6 l6.2 -7.1" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><text x="94" y="550" font-size="20" font-weight="600" fill="#19375f"><tspan x="94" dy="0">Create one page with priorities, resources, review, and next</tspan><tspan x="94" dy="30">actions.</tspan></text><circle cx="72" cy="614" r="8" fill="#0d8e78"/>
      <path d="M68 614 l3.2 3.6 l6.2 -7.1" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><text x="94" y="622" font-size="20" font-weight="600" fill="#19375f"><tspan x="94" dy="0">Choose only 1-3 weekly priorities.</tspan></text><circle cx="72" cy="656" r="8" fill="#0d8e78"/>
      <path d="M68 656 l3.2 3.6 l6.2 -7.1" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><text x="94" y="664" font-size="20" font-weight="600" fill="#19375f"><tspan x="94" dy="0">Mark energy, cash flow, relationships, and learning health.</tspan></text><circle cx="72" cy="698" r="8" fill="#0d8e78"/>
      <path d="M68 698 l3.2 3.6 l6.2 -7.1" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><text x="94" y="706" font-size="20" font-weight="600" fill="#19375f"><tspan x="94" dy="0">Turn each goal into one action that can be done tomorrow.</tspan></text>
