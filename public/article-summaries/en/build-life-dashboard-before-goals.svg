        <text text-anchor="middle" x="842.6666666666666" y="342" font-size="20" font-weight="800" fill="#07407f"><tspan x="842.6666666666666" dy="0">Review</tspan><tspan x="842.6666666666666" dy="24">Notes</tspan></text><rect x="888" y="310" width="128" height="70" rx="14" fill="#eaf4ff" stroke="#79b8ed" stroke-width="2"/>
